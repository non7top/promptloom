name: 'Predict next version'
description: >-
  Simulates the exact merge commit GitHub would create for this PR (subject
  "Merge pull request #N from owner/branch", body: the current PR title) and
  dry-runs release-please against it. This repo only merges via "Create a
  merge commit," and GitHub bakes the PR title into that commit's body,
  which release-please reads as its own conventional commit — so a plain
  dry-run against just the PR branch's own commits can under-predict the
  real bump if the PR title has drifted from what those commits actually
  say. Optionally also posts/updates the release-please-preview PR comment
  and toggles the RELEASE label as a side effect.

inputs:
  github-token:
    description: >-
      Token for release-please's own API calls and (if post-comment is
      true) for commenting/labeling the PR. Composite actions can't read
      the secrets context directly, so this must be passed in explicitly
      from the calling workflow (e.g. secrets.GITHUB_TOKEN).
    required: true
  post-comment:
    description: >-
      Whether to also post/update the release-please-preview PR comment and
      set/remove the RELEASE label as a side effect of running this action.
    required: false
    default: 'true'

outputs:
  version:
    description: >-
      Predicted next version (e.g. "1.2.0") if this PR were merged right
      now, or empty if there are no releasable changes.
    value: ${{ steps.extract.outputs.version }}
  would-release:
    description: Whether merging this PR would trigger a release ("true"/"false").
    value: ${{ steps.extract.outputs.would_release }}
  bump-type:
    description: >-
      Predicted bump type ("major"/"minor"/"patch") if this PR were merged
      right now, or empty if there are no releasable changes.
    value: ${{ steps.extract.outputs.bump_type }}

runs:
  using: composite
  steps:
    - name: Build the merge commit GitHub would create
      id: build_merge
      shell: bash
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        HEAD_LABEL: ${{ github.event.pull_request.head.repo.owner.login }}/${{ github.head_ref }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        git fetch origin "$BASE_REF:refs/heads/preview-base" "$HEAD_SHA:refs/heads/preview-head"
        git checkout -b preview-merge preview-base

        MERGE_MESSAGE=$(printf 'Merge pull request #%s from %s\n\n%s' "$PR_NUMBER" "$HEAD_LABEL" "$PR_TITLE")
        if git -c user.name="release-please-preview" -c user.email="actions@github.com" \
            merge --no-ff preview-head -m "$MERGE_MESSAGE"; then
          echo "target=preview-merge" >> "$GITHUB_OUTPUT"
        else
          # Base moved in a way that conflicts with the PR since it was
          # opened — fall back to previewing the branch's own commits
          # rather than failing the whole action over it. --abort itself
          # can fail here (e.g. "nothing to abort" for a conflict caught
          # before MERGE_HEAD existed) — harmless, we're abandoning this
          # branch either way.
          git merge --abort || true
          echo "target=$HEAD_SHA" >> "$GITHUB_OUTPUT"
        fi

    # The release-please-action's skip-github-pull-request/skip-github-release
    # inputs don't give a true dry run — every output (prs_created, pr,
    # version, release_created, ...) comes back completely empty when
    # creation is skipped, confirmed directly against a real run and
    # tracked upstream at
    # https://github.com/googleapis/release-please-action/issues/1214
    # The CLI's own --dry-run is the only thing that actually computes
    # without creating anything. --local reads commit history straight
    # from this checkout (via git log), rather than the GitHub API, which
    # is what lets it see our not-yet-pushed simulated merge commit.
    - name: Run release-please dry run
      shell: bash
      env:
        TOKEN_INPUT: ${{ inputs.github-token }}
      run: |
        npx --yes release-please release-pr \
          --token="$TOKEN_INPUT" \
          --repo-url="${{ github.repository }}" \
          --target-branch="${{ steps.build_merge.outputs.target }}" \
          --local \
          --local-path="$(pwd)" \
          --dry-run > dryrun-output.txt 2>&1 || true

    - name: Extract predicted version
      id: extract
      shell: bash
      run: |
        # "Would open 0 pull requests" still matches /^Would open/, so the
        # trimmed file is never actually empty — check the real count
        # instead of relying on that file having any bytes in it.
        would_release=false
        if grep -qE '^Would open [1-9]' dryrun-output.txt; then
          would_release=true
        fi
        echo "would_release=$would_release" >> "$GITHUB_OUTPUT"

        version=""
        if [ "$would_release" = true ]; then
          version=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' dryrun-output.txt | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"

        # Diff the last released version (read from the manifest on the
        # base branch, before this PR's own changes) against the predicted
        # version above to classify the bump. release-please's dry-run
        # text doesn't state this directly, so we derive it from the two
        # numbers rather than trying to re-parse commit types ourselves.
        bump_type=""
        if [ "$would_release" = true ]; then
          current_version=$(git show preview-base:.release-please-manifest.json | jq -r '."."')
          IFS='.' read -r cur_major cur_minor _ <<< "$current_version"
          IFS='.' read -r new_major new_minor _ <<< "$version"
          if [ "$new_major" -gt "$cur_major" ]; then
            bump_type=major
          elif [ "$new_minor" -gt "$cur_minor" ]; then
            bump_type=minor
          else
            bump_type=patch
          fi
        fi
        echo "bump_type=$bump_type" >> "$GITHUB_OUTPUT"

        # The `body:` field is the exact markdown release-please would put
        # in the real release PR/GitHub release — already valid Markdown
        # (headings, links, bold), not a code block to be displayed
        # verbatim. Strip the "body: " prefix from its first line and keep
        # everything through the line before "updates: N" (a separate,
        # non-body debug field the CLI dumps after it), dropping the
        # fork/title/branch/draft debug lines before it entirely — this
        # comment's own header already says what would happen.
        awk '
          /^body: / { print substr($0, 7); capturing=1; next }
          capturing && /^updates: [0-9]+$/ { exit }
          capturing { print }
        ' dryrun-output.txt > trimmed-output.txt

    - name: Remove previous preview comment
      if: inputs.post-comment == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        comment_ids=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --jq '.[] | select(.body | contains("<!-- release-please-preview -->")) | .id')
        for id in $comment_ids; do
          gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$id"
        done

    - name: Post preview comment
      if: inputs.post-comment == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        {
          echo "<!-- release-please-preview -->"
          echo "### 🤖 release-please preview"
          echo
          echo "What merging this PR into \`master\` would trigger:"
          echo
          if [ "${{ steps.extract.outputs.would_release }}" = true ]; then
            cat trimmed-output.txt
          else
            echo "No releasable changes detected."
          fi
          echo
          echo "[Full run]($run_url)"
        } > comment-body.md
        gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body-file comment-body.md

    # A label's color is a repo-wide property of the label itself, not a
    # per-application snapshot — recoloring it here changes how it displays
    # on every open PR currently wearing it, not just this one. That's fine
    # in practice since this repo normally only has one release-triggering
    # PR (or release-please's own release PR) open at a time. Keep this
    # color scheme in sync with release-please.yml's copy so RELEASE means
    # the same thing everywhere it shows up: green (patch) is the routine,
    # expected case; yellow (minor) is new-but-compatible; red (major) is
    # the one worth a second look before merging.
    - name: Label PR if it would trigger a release
      if: inputs.post-comment == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh label create RELEASE --color FF0000 --force --repo "${{ github.repository }}"
        if [ "${{ steps.extract.outputs.would_release }}" = true ]; then
          case "${{ steps.extract.outputs.bump_type }}" in
            major) color=D93F0B ;;
            minor) color=FBCA04 ;;
            patch) color=0E8A16 ;;
            *) color=FF0000 ;;
          esac
          gh label edit RELEASE --color "$color" --repo "${{ github.repository }}"
          gh pr edit "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --add-label RELEASE
        else
          gh pr edit "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --remove-label RELEASE || true
        fi
