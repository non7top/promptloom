name: Release

on:
  workflow_run:
    workflows: ["release-please"]
    types: [completed]

jobs:
  # release-please-action creates its tag/release using the default
  # GITHUB_TOKEN, and GitHub doesn't trigger downstream workflows for refs
  # created that way (an anti-recursion guard) — so this can't just trigger
  # on push: tags like a normal release workflow would; a completed
  # workflow_run fires regardless of what token the upstream run used.
  # release-please itself runs on every push to master, not just ones that
  # cut a release, so check whether this particular run actually did by
  # looking for a semver tag on its exact commit before building anything.
  check-release-tag:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.find_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          # workflow_run doesn't check out the commit that triggered it by
          # default — it checks out the default branch's current tip, which
          # may have moved on since. Pin to the exact commit release-please
          # just processed, and fetch tags explicitly since fetch-depth: 0
          # alone doesn't guarantee it.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Find a release tag pointing at this commit
        id: find_tag
        shell: bash
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  release:
    needs: check-release-tag
    if: needs.check-release-tag.outputs.tag != ''
    runs-on: windows-latest
    permissions:
      contents: write
      # Keyless cosign signing exchanges this job's OIDC token for a
      # short-lived Fulcio cert — no signing key ever touches the repo.
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish (build installer + create GitHub release)
        run: npm run publish
        env:
          # electron-builder's GitHub publisher reads GH_TOKEN specifically
          # (not GITHUB_TOKEN, which was electron-forge's PublisherGithub
          # convention) — set both since nothing else here reads either.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      # Keyless: cosign trades this job's GitHub OIDC token for a
      # short-lived Fulcio cert and records the signature in the public
      # Rekor log, so there's no private key to hold or leak. Signs
      # whatever the maker produced locally (already uploaded by the
      # publish step above) rather than re-downloading from the release.
      # electron-builder's NSIS target produces a single installer .exe in
      # dist/ — no .nupkg/RELEASES equivalents (those were Squirrel-only
      # update-feed files).
      - name: Sign release artifacts (cosign, keyless)
        id: cosign_sign
        shell: bash
        run: |
          shopt -s nullglob
          bundles=()
          for f in dist/*.exe; do
            cosign sign-blob --yes --bundle "$f.cosign.bundle" "$f"
            bundles+=("$f.cosign.bundle")
          done
          printf '%s\n' "${bundles[@]}" > cosign_bundles.txt
          cat cosign_bundles.txt

      - name: Upload signature bundles to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.check-release-tag.outputs.tag }}" $(cat cosign_bundles.txt) --clobber --repo non7top/promptloom
