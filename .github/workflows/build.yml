name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Install dependencies
        run: docker compose run --rm dev npm ci

      - name: Lint
        run: docker compose run --rm dev npm run lint

      - name: Type-check
        run: docker compose run --rm dev npx tsc --noEmit

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Package Windows installer
        run: npm run make

      - uses: actions/upload-artifact@v4
        with:
          name: promptloom-windows-${{ github.sha }}
          path: out/make/**
          retention-days: 14
