name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # docker compose build has no cross-run cache on ephemeral GH-hosted
      # runners, so every run was re-doing the full apt-get install (~90s+
      # for xvfb + Electron's runtime libs) from scratch. Pre-build the
      # same image via buildx with the GitHub Actions cache backend, tagged
      # to match what `docker compose build` will look for (see docker-
      # compose.yml's top-level `name:`), so that step becomes a fast
      # cache-hit no-op instead.
      - name: Build dev image (with layer cache)
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag promptloom-dev:latest \
            --load \
            -f Dockerfile.dev .
      - name: Build dev image
        run: docker compose build dev

      - name: Install dependencies
        run: docker compose run --rm dev npm ci

      - name: Lint
        run: docker compose run --rm dev npm run lint

      - name: Type-check
        run: docker compose run --rm dev npx tsc --noEmit

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history and tags: predict-next-version needs to walk back
          # to the last release tag and build its own merge commit on top
          # of this clone.
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute short SHA
        id: vars
        shell: bash
        run: echo "sha_short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      # post-comment: false — this action's own PR comment/RELEASE-label
      # side effects are release-please-preview.yml's job; here we only
      # want the predicted version, to name this PR's build artifacts.
      - name: Predict next version
        id: predict
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/predict-next-version
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          post-comment: 'false'

      # The action above leaves the working tree on its own synthetic
      # preview-merge branch (or, if simulating the merge failed, on
      # unmerged master) to compute the prediction — restore the PR's own
      # head commit (which that action already fetched into this local
      # branch) so the actual build below builds the PR's real changes,
      # not whatever the action happened to leave checked out.
      - name: Restore the PR's own head commit for the build
        if: github.event_name == 'pull_request'
        shell: bash
        run: git checkout preview-head

      - name: Package Windows installer
        run: npm run make

      # Only meaningful for PR builds with a predicted release — plain
      # pushes to master (already merged, not previewing anything) and
      # no-releasable-change PRs keep the plain glob path below instead.
      - name: Rename build artifacts to the predicted version
        id: artifact_names
        if: github.event_name == 'pull_request' && steps.predict.outputs.version != ''
        shell: bash
        run: |
          VERSION_TAG="${{ steps.predict.outputs.version }}-rc${{ github.event.pull_request.number }}"
          EXE_PATH=$(find out/make/squirrel.windows -name '*.exe' | head -1)
          NUPKG_PATH=$(find out/make/squirrel.windows -name '*.nupkg' | head -1)
          RELEASES_PATH=$(find out/make/squirrel.windows -name 'RELEASES' | head -1)

          NEW_EXE="$(dirname "$EXE_PATH")/promptloom-installer-${VERSION_TAG}.exe"
          NEW_NUPKG="$(dirname "$NUPKG_PATH")/promptloom-nupkg-${VERSION_TAG}.nupkg"
          NEW_RELEASES="$(dirname "$RELEASES_PATH")/promptloom-releases-${VERSION_TAG}"

          mv "$EXE_PATH" "$NEW_EXE"
          mv "$NUPKG_PATH" "$NEW_NUPKG"
          mv "$RELEASES_PATH" "$NEW_RELEASES"

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "exe_path=$NEW_EXE" >> "$GITHUB_OUTPUT"
          echo "nupkg_path=$NEW_NUPKG" >> "$GITHUB_OUTPUT"
          echo "releases_path=$NEW_RELEASES" >> "$GITHUB_OUTPUT"

      - name: Upload installer (Setup.exe)
        id: upload-installer
        uses: actions/upload-artifact@v7
        with:
          # `name` is ignored by the action whenever archive: false — the
          # artifact takes the name of the file it's given instead, so the
          # rename step above (when it ran) is what actually names this.
          path: ${{ steps.artifact_names.outputs.exe_path || 'out/make/squirrel.windows/**/*.exe' }}
          retention-days: 14
          # Skip the action's own zip wrapper entirely rather than just
          # turning off its compression — Setup.exe is already a compressed
          # archive internally, so both were pure overhead.
          archive: false

      - name: Upload update package (.nupkg)
        id: upload-nupkg
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.artifact_names.outputs.nupkg_path || 'out/make/squirrel.windows/**/*.nupkg' }}
          retention-days: 14
          # Same reasoning as Setup.exe above — .nupkg is itself a
          # zip-based package format, so there's nothing to gain from
          # wrapping it in another zip.
          archive: false

      - name: Upload RELEASES manifest
        id: upload-releases
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.artifact_names.outputs.releases_path || 'out/make/squirrel.windows/**/RELEASES' }}
          retention-days: 14
          archive: false

      - name: Comment download links on PR
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL_SUFFIX="${{ steps.artifact_names.outputs.version_tag || steps.vars.outputs.sha_short }}"
          gh pr comment "${{ github.event.pull_request.number }}" --body "Windows build ready for \`${{ steps.vars.outputs.sha_short }}\`:
          - [promptloom-installer-${LABEL_SUFFIX}](${{ steps.upload-installer.outputs.artifact-url }})
          - [promptloom-nupkg-${LABEL_SUFFIX}](${{ steps.upload-nupkg.outputs.artifact-url }})
          - [promptloom-releases-${LABEL_SUFFIX}](${{ steps.upload-releases.outputs.artifact-url }})"
