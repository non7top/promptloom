name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Install dependencies
        run: docker compose run --rm dev npm ci

      - name: Lint
        run: docker compose run --rm dev npm run lint

      - name: Type-check
        run: docker compose run --rm dev npx tsc --noEmit

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Package Windows installer
        run: npm run make

      - name: Upload installer (Setup.exe)
        uses: actions/upload-artifact@v4
        with:
          name: promptloom-installer-${{ github.sha }}
          path: out/make/squirrel.windows/**/*.exe
          retention-days: 14

      - name: Upload update package (.nupkg)
        uses: actions/upload-artifact@v4
        with:
          name: promptloom-nupkg-${{ github.sha }}
          path: out/make/squirrel.windows/**/*.nupkg
          retention-days: 14

      - name: Upload RELEASES manifest
        uses: actions/upload-artifact@v4
        with:
          name: promptloom-releases-${{ github.sha }}
          path: out/make/squirrel.windows/**/RELEASES
          retention-days: 14

      - name: Comment download links on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "${{ github.event.pull_request.number }}" --body "Windows build ready for \`${{ github.sha }}\`: download the \`promptloom-installer-*\`, \`promptloom-nupkg-*\`, and \`promptloom-releases-*\` artifacts from $RUN_URL (scroll to Artifacts at the bottom)."
