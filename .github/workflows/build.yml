name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # docker compose build has no cross-run cache on ephemeral GH-hosted
      # runners, so every run was re-doing the full apt-get install (~90s+
      # for xvfb + Electron's runtime libs) from scratch. Pre-build the
      # same image via buildx with the GitHub Actions cache backend, tagged
      # to match what `docker compose build` will look for (see docker-
      # compose.yml's top-level `name:`), so that step becomes a fast
      # cache-hit no-op instead.
      - name: Build dev image (with layer cache)
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag promptloom-dev:latest \
            --load \
            -f Dockerfile.dev .
      - name: Build dev image
        run: docker compose build dev

      - name: Install dependencies
        run: docker compose run --rm dev npm ci

      - name: Lint
        run: docker compose run --rm dev npm run lint

      - name: Type-check
        run: docker compose run --rm dev npx tsc --noEmit

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute short SHA
        id: vars
        shell: bash
        run: echo "sha_short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Package Windows installer
        run: npm run make

      - name: Upload installer (Setup.exe)
        uses: actions/upload-artifact@v7
        with:
          name: promptloom-installer-${{ steps.vars.outputs.sha_short }}
          path: out/make/squirrel.windows/**/*.exe
          retention-days: 14
          # Setup.exe is already a compressed archive internally — re-
          # compressing it into the artifact zip just burns CPU for no
          # real size benefit.
          compression-level: 0

      - name: Upload update package (.nupkg)
        uses: actions/upload-artifact@v7
        with:
          name: promptloom-nupkg-${{ steps.vars.outputs.sha_short }}
          path: out/make/squirrel.windows/**/*.nupkg
          retention-days: 14

      - name: Upload RELEASES manifest
        uses: actions/upload-artifact@v7
        with:
          name: promptloom-releases-${{ steps.vars.outputs.sha_short }}
          path: out/make/squirrel.windows/**/RELEASES
          retention-days: 14

      - name: Comment download links on PR
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "${{ github.event.pull_request.number }}" --body "Windows build ready for \`${{ steps.vars.outputs.sha_short }}\`: download the \`promptloom-installer-*\`, \`promptloom-nupkg-*\`, and \`promptloom-releases-*\` artifacts from $RUN_URL (scroll to Artifacts at the bottom)."
