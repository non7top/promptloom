name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Install dependencies
        run: docker compose run --rm dev npm ci

      - name: Lint
        run: docker compose run --rm dev npm run lint

      - name: Type-check
        run: docker compose run --rm dev npx tsc --noEmit
