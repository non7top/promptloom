version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # "chore" for both — a dependency bump isn't reliably just a "fix"
    # (could carry breaking changes or capability we now rely on), and
    # there's no static way to have Dependabot self-report severity. A
    # human decides if a given bump actually warrants a real release,
    # rather than every bump silently triggering one.
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    ignore:
      # electron-vite@5.0.0 (our build tool, replacing @electron-forge/
      # plugin-vite) peer-pins vite to ^5 || ^6 || ^7 — a vite 8 bump breaks
      # the build until electron-vite ships support for it.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # @vitejs/plugin-react@^4.7.0 already supports vite up through ^7; its
      # own next major (6.x) requires vite@^8, which we can't take yet per
      # the vite ignore above — bumping this alone would force that.
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      # @typescript-eslint/*@8.64.0 only parses typescript >=4.8.4 <6.1.0;
      # typescript itself is already past that (7.x) — bumping our
      # typescript pin needs a coordinated @typescript-eslint bump first,
      # not a piecemeal one.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # ESLint 9+ dropped .eslintrc.json support (flat config only), and
      # eslint-plugin-import's peerDependencies still cap at ^9 (no 10 yet)
      # — migrating is a deliberate task, not a piecemeal Dependabot bump.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
