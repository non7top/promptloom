appId: com.non7top.promptloom
productName: PromptLoom
# electron-builder lowercases the executable name on Linux by default
# (producing "promptloom") unless pinned explicitly — set it so
# scripts/afterPack.cjs (and anyone launching the unpacked binary) can rely
# on the same name across platforms.
executableName: PromptLoom
directories:
  output: dist
  buildResources: build

# electron-vite already bundles everything main/preload/renderer need
# (see electron.vite.config.ts) — nothing under node_modules is required
# at runtime, so files is deliberately narrow instead of electron-builder's
# node_modules-including default.
files:
  - out/**/*
  - package.json

afterPack: scripts/afterPack.cjs

win:
  target: nsis
  artifactName: '${productName}-Setup-${version}.${ext}'
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - deb
    - rpm
  category: Utility

mac:
  target:
    - zip

publish:
  provider: github
  owner: non7top
  repo: promptloom
  # electron-builder defaults to publishing a *draft* release and refuses
  # to touch a release of a different type than the one already published —
  # release-please already creates a normal (non-draft) release for this
  # tag before this workflow runs, so without this the v2.0.0 release
  # shipped with only the cosign signature attached and no installer at
  # all ("existing type not compatible with publishing type" in the
  # electron-builder log, silently skipping every upload).
  releaseType: release
